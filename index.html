<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
              integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <title>Hello, world!</title>

    <body style="font-family: 'Nunito', sans-serif">
        <div class="container">
            <hr>
            <div class="row">
                <div class="col-md-3">
                    <img src="video-to-audio-bot.jpg" class="rounded w-100 shadow-s border
                                                             ">
                </div>
                <div class="col-md-9 mt-2">
                    <h3 class="mb-0 fw-bold p-3 rounded-top border border-bottom-0 bg-light">Video To Audio Bot</h3>
                    <p class="lead m-0 alert-primary p-3">
                        <a class="fs-5 text-decoration-none"                                                       
                           href="https://t.me/VideoToAudioOKBot">@VideoToAudioOKBot</a>
                    </p>
                    <p class="fs-5 m-0 p-3 border border-top-0 rounded-bottom">This bot can convert videos up to 20MB into audio format.</p>
                </div> 
            </div>
            <hr>
            <div class="row">
                <div class="col-md-3">
                    <img src="wiki-bot.jpg" class="rounded w-100 shadow-s border">
                </div>
                <div class="col-md-9 mt-2">
                    <h3 class="mb-0 fw-bold p-3 rounded-top border border-bottom-0 bg-light">Wikipedia Bot</h3>
                    <p class="lead m-0 alert-primary p-3">
                        <a class="fs-5 text-decoration-none"                                                       
                           href="https://t.me/OK_WikiBot">@OK_WikiBot</a>
                    </p>
                    <p class="fs-5 m-0 p-3 border border-top-0 rounded-bottom">Just send the bot the word and the bot will search for it on wikipedia.</p>
                </div> 
            </div>
            <hr>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" 
                integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" 
                integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
